<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моето меню - Food Delivery</title>
    <link rel="stylesheet" href="css/food.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>

    <header>
        <a href="menuitems.html" class="logo"><i class="fas fa-utensils"></i> FOOD <span>DELIVERY</span></a>
        <nav class="navbar">
            <a href="menuitems.html" class="active">Моето меню</a>
            <a href="owner-orders.html">Поръчки</a>
        </nav>
        <div style="display:flex;align-items:center;gap:1.5rem;">
            <div class="dropdown">
                <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" style="font-size:1.4rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.8rem;">
                    <i class="fas fa-user-circle" style="font-size:2rem;color:var(--primary);"></i>
                    <span id="nav-username"></span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><span class="dropdown-item-text" style="color:var(--text-muted);font-size:1.2rem;">RestaurantOwner</span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" onclick="logout()" style="cursor:pointer;"><i class="fas fa-sign-out-alt me-2"></i>Изход</a></li>
                </ul>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="section-head">
            <span class="sub">управление</span>
            <h2>Моето меню</h2>
        </div>

        <div id="alerts"></div>

        <!-- Restaurant Info + Upload -->
        <div class="rest-hero" id="rest-hero" style="display:none;">
            <div id="rest-img-wrap">
                <div class="rest-hero-placeholder">🍽️</div>
            </div>
            <div style="flex:1;">
                <h3 style="font-size:2rem;font-weight:800;margin-bottom:.5rem;" id="rest-hero-name"></h3>
                <p style="font-size:1.3rem;color:var(--text-muted);margin-bottom:1.5rem;" id="rest-hero-address"></p>
                <label style="display:inline-flex;align-items:center;gap:.8rem;background:var(--primary);color:white;padding:.7rem 1.5rem;border-radius:var(--radius);font-size:1.3rem;font-weight:700;cursor:pointer;">
                    <i class="fas fa-camera"></i> Смени снимка на ресторанта
                    <input type="file" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="uploadRestImage(this)" />
                </label>
            </div>
        </div>

        <!-- Search + Add -->
        <div class="search-bar">
            <input type="text" id="search-name" placeholder="Търси по название..." />
            <input type="text" id="search-category" placeholder="Търси по категория..." />
            <button class="btn-search" onclick="loadMenuItems()"><i class="fas fa-search"></i> Търси</button>
            <button class="btn-search" onclick="openAddModal()" style="background:#198754;">
                <i class="fas fa-plus"></i> Добави артикул
            </button>
        </div>

        <div id="menu-msg"></div>
        <div class="cards-grid" id="menu-grid"></div>
        <div class="pagination" id="pagination"></div>
    </section>

    <!-- MODAL: Add/Edit MenuItem -->
    <div class="modal fade" id="menuItemModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--primary);color:white;">
                    <h5 class="modal-title" id="modal-title">Добави артикул</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="menu-id" />
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Название *</label>
                            <input type="text" class="form-control" id="menu-name" maxlength="100" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Категория *</label>
                            <input type="text" class="form-control" id="menu-category" maxlength="50" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Цена (€) *</label>
                            <input type="number" class="form-control" id="menu-price" min="0.01" step="0.01" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Тегло (грамове)</label>
                            <input type="number" class="form-control" id="menu-weight" min="0" />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Наличен</label>
                            <select class="form-select" id="menu-available">
                                <option value="true">Да</option>
                                <option value="false">Не</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" id="menu-description" maxlength="500" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Затвори</button>
                    <button type="button" onclick="saveMenuItem()" style="background:var(--primary);color:white;border:none;padding:.5rem 1.5rem;border-radius:.5rem;font-size:1.3rem;cursor:pointer;">Запази</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-col"><h3><i class="fas fa-utensils"></i> FOOD DELIVERY</h3><p>Поръчайте любимата си храна бързо и лесно.</p></div>
            <div class="footer-col"><h3>Бързи връзки</h3><a href="menuitems.html">Моето меню</a><a href="owner-orders.html">Поръчки</a></div>
            <div class="footer-col"><h3>Контакти</h3><p><i class="fas fa-phone"></i> +359 888 000 000</p><p><i class="fas fa-envelope"></i> info@fooddelivery.bg</p></div>
        </div>
        <div class="footer-bottom">© 2026 <span>Food Delivery</span> — Всички права запазени</div>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (!isLoggedIn() || getRole() !== 'RestaurantOwner') {
            window.location.href = 'index.html';
        }

        document.getElementById('nav-username').textContent = getUsername();

        let currentPage = 1;
        let myRestaurantId = null;
        let myRestaurant = null;

        async function findMyRestaurant() {
            const userId = parseInt(getUserId());
            let page = 1;
            while (true) {
                const result = await getRestaurants(page, '', '', '', 'asc');
                if (!result?.ok) break;
                const found = result.data.items.find(r => r.ownerId === userId);
                if (found) return found;
                if (page >= result.data.totalPages) break;
                page++;
            }
            return null;
        }

        async function loadRestaurantHero() {
            myRestaurant = await findMyRestaurant();
            if (!myRestaurant) return;

            myRestaurantId = myRestaurant.id;

            document.getElementById('rest-hero').style.display = 'flex';
            document.getElementById('rest-hero-name').textContent = myRestaurant.name;
            document.getElementById('rest-hero-address').textContent = myRestaurant.address;

            if (myRestaurant.imagePath) {
                document.getElementById('rest-img-wrap').innerHTML = `
                    <img src="https://localhost:7001${myRestaurant.imagePath}" alt="${myRestaurant.name}" />
                `;
            }
        }

        async function uploadRestImage(input) {
            const file = input.files[0];
            if (!file) return;
            const result = await uploadRestaurantImage(myRestaurantId, file);
            if (result) {
                showAlert('<i class="fas fa-check me-2"></i>Снимката на ресторанта е качена!');
                await loadRestaurantHero();
            } else {
                showAlert('Грешка при качване. Позволени формати: JPG, PNG, WEBP.', 'danger');
            }
        }

        async function uploadItemImage(id, input) {
            const file = input.files[0];
            if (!file) return;
            const result = await uploadMenuItemImage(id, file);
            if (result) {
                showAlert('<i class="fas fa-check me-2"></i>Снимката е качена!');
                loadMenuItems(currentPage);
            } else {
                showAlert('Грешка при качване. Позволени формати: JPG, PNG, WEBP.', 'danger');
            }
        }

        async function loadMenuItems(page = 1) {
            currentPage = page;

            if (!myRestaurantId) {
                await loadRestaurantHero();
            }

            if (!myRestaurantId) {
                document.getElementById('menu-msg').innerHTML = `
                    <div style="text-align:center;padding:5rem 2rem;">
                        <i class="fas fa-store-slash" style="font-size:6rem;color:var(--border);display:block;margin-bottom:2rem;"></i>
                        <h3 style="font-size:2rem;font-weight:700;color:var(--text-muted);">Нямате назначен ресторант</h3>
                        <p style="font-size:1.4rem;color:var(--text-muted);">Свържете се с администратора.</p>
                    </div>`;
                return;
            }

            const search = document.getElementById('search-name').value;
            const search2 = document.getElementById('search-category').value;

            document.getElementById('menu-msg').innerHTML = '<p style="text-align:center;font-size:1.4rem;color:var(--text-muted);">Зареждане...</p>';

            const result = await getMenuItems(myRestaurantId, page, search, search2);

            if (!result?.ok) {
                document.getElementById('menu-msg').innerHTML = '<p style="text-align:center;color:red;font-size:1.4rem;">Грешка при зареждане.</p>';
                return;
            }

            const { items, totalPages } = result.data;
            document.getElementById('menu-msg').innerHTML = '';

            if (!items || items.length === 0) {
                document.getElementById('menu-grid').innerHTML = '<p style="text-align:center;font-size:1.4rem;color:var(--text-muted);grid-column:1/-1;">Няма артикули. Добавете първия!</p>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            document.getElementById('menu-grid').innerHTML = items.map(m => `
                <div class="card">
                    ${m.imagePath
                    ? `<img src="https://localhost:7001${m.imagePath}" alt="${m.name}" class="card-img" />`
                    : '<div class="card-placeholder">🍔</div>'
                }
                    <span class="card-badge">€${m.price.toFixed(2)}</span>
                    ${!m.isAvailable ? '<span class="card-badge-danger">Неналичен</span>' : ''}
                    <div class="card-body">
                        <div class="card-title">${m.name}</div>
                        <div class="card-text"><i class="fas fa-tag"></i> ${m.category}</div>
                        ${m.description ? `<div class="card-text">${m.description}</div>` : ''}
                        ${m.weight > 0 ? `<div class="card-text"><i class="fas fa-weight"></i> ${m.weight}г</div>` : ''}
                    </div>
                    <div class="card-footer" style="flex-wrap:wrap;gap:.5rem;">
                        <label class="upload-btn">
                            <i class="fas fa-camera"></i> Снимка
                            <input type="file" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="uploadItemImage(${m.id}, this)" />
                        </label>
                        <button class="btn-card" style="flex:1;" onclick='openEditModal(${JSON.stringify(m).replace(/'/g, "&#39;")})'>
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-card-danger" onclick="deleteItem(${m.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            document.getElementById('pagination').innerHTML = Array.from({ length: totalPages }, (_, i) => i + 1)
                .map(i => `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadMenuItems(${i})">${i}</button>`)
                .join('');
        }

        function openAddModal() {
            document.getElementById('menu-id').value = '';
            document.getElementById('menu-name').value = '';
            document.getElementById('menu-category').value = '';
            document.getElementById('menu-price').value = '';
            document.getElementById('menu-weight').value = '';
            document.getElementById('menu-description').value = '';
            document.getElementById('menu-available').value = 'true';
            document.getElementById('modal-title').textContent = 'Добави артикул';
            new bootstrap.Modal(document.getElementById('menuItemModal')).show();
        }

        function openEditModal(m) {
            document.getElementById('menu-id').value = m.id;
            document.getElementById('menu-name').value = m.name;
            document.getElementById('menu-category').value = m.category;
            document.getElementById('menu-price').value = m.price;
            document.getElementById('menu-weight').value = m.weight;
            document.getElementById('menu-description').value = m.description || '';
            document.getElementById('menu-available').value = m.isAvailable.toString();
            document.getElementById('modal-title').textContent = 'Редактирай артикул';
            new bootstrap.Modal(document.getElementById('menuItemModal')).show();
        }

        async function saveMenuItem() {
            const id = document.getElementById('menu-id').value;
            const dto = {
                name: document.getElementById('menu-name').value,
                category: document.getElementById('menu-category').value,
                price: parseFloat(document.getElementById('menu-price').value),
                weight: parseFloat(document.getElementById('menu-weight').value) || 0,
                description: document.getElementById('menu-description').value || null,
                isAvailable: document.getElementById('menu-available').value === 'true',
                restaurantId: myRestaurantId
            };

            if (!dto.name || !dto.category || !dto.price) {
                showAlert('Моля попълнете задължителните полета!', 'danger');
                return;
            }

            let result;
            if (id) result = await updateMenuItem(id, dto);
            else result = await createMenuItem(dto);

            if (result && (result === true || result.ok)) {
                showAlert(id ? 'Артикулът е обновен!' : 'Артикулът е добавен!');
                bootstrap.Modal.getInstance(document.getElementById('menuItemModal')).hide();
                loadMenuItems(currentPage);
            } else {
                showAlert('Грешка при запазване.', 'danger');
            }
        }

        async function deleteItem(id) {
            if (!confirm('Изтриване на артикул?')) return;
            const result = await deleteMenuItem(id);
            if (result) { showAlert('Артикулът е изтрит!'); loadMenuItems(currentPage); }
            else showAlert('Грешка при изтриване.', 'danger');
        }

        loadMenuItems();
    </script>
</body>
</html>
